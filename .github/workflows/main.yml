name: Build ARM Firmware

# -----------------------------------------------------------------------------
# Workflow triggers
# -----------------------------------------------------------------------------
# - Runs automatically on push to the main branch
# - Runs on pull requests targeting main
# - Can also be triggered manually from the GitHub Actions UI
# -----------------------------------------------------------------------------
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # les autres builds continuent si l'un échoue
      matrix:
        preset:
          - release-pong
          - debug-pong

    steps:

      # -----------------------------------------------------------------------
      # Step 1 - Checkout the current repository
      # Retrieves the project source code so the workflow can build it.
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2 - Download only the required part of the Mk repository
      # We use sparse checkout to download only Mk/Includes instead of the
      # full repository. This reduces network usage and speeds up CI.
      # -----------------------------------------------------------------------
      - name: Sparse checkout Mk/Includes
        run: |
          git clone --no-checkout https://github.com/EmbSoft3/Mk.git Mk
          cd Mk
          git sparse-checkout init --cone
          git sparse-checkout set Mk/Includes
          git checkout

      # -----------------------------------------------------------------------
      # Step 3 - Install the ARM GCC toolchain
      # Installs the ARM GNU compiler used to build the firmware.
      # Version used: 10.3-2021.10
      # -----------------------------------------------------------------------
      - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: "10.3-2021.10"

      # -----------------------------------------------------------------------
      # Step 4 - Install CMake and Ninja
      # Installs CMAke and Ninja toolkit.
      # Version used: latest
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ninja-build \
            cmake

      # -----------------------------------------------------------------------
      # Step 5 - Configure
      # -----------------------------------------------------------------------
      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -DINCLUDES_API_PATH=${{ github.workspace }}/Mk/Mk/Includes

      # -----------------------------------------------------------------------
      # Step 6 - Build the firmware 
      # -----------------------------------------------------------------------
      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      # -----------------------------------------------------------------------
      # Step 7 - Upload build artifacts
      # Uploads the generated firmware files (.elf, .map, .srec) so they can
      # be downloaded from the GitHub Actions interface.
      #
      # The step is skipped when running locally with "act" because artifact
      # upload requires the GitHub runtime environment.
      # -----------------------------------------------------------------------
      - name: Upload artifacts (${{ matrix.preset }})
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/*.elf
            build/${{ matrix.preset }}/*.map
          if-no-files-found: error
      